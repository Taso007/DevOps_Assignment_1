name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        if: vars.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -X POST ${{ vars.RENDER_DEPLOY_HOOK_URL }}
      - name: Manual Deployment Info
        if: vars.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "No Render Deploy Hook URL found. If you are using Render's GitHub Integration, ensure 'Auto-Deploy' is set to 'No' and trigger manually, or provide the hook URL in GitHub Vars."
